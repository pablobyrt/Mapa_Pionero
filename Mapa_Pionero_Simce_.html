<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Modelo Pionero - Anglo American · SIMCE 2025</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f4f8; font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
@media (max-width: 768px) {
  body { height: 100dvh; height: -webkit-fill-available; }
  #body { flex-direction: column !important; }
  #map { flex: 0 0 50vh !important; height: 50vh !important; min-height: 200px; }
  #panel { width: 100% !important; border-left: none !important; border-top: 2px solid #e2e8f0; flex: 1; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  #banner { padding: 0 8px !important; gap: 4px; }
  #banner-title { font-size: 10px !important; }
  .ts { padding: 2px 6px !important; }
  .ts-n { font-size: 13px !important; }
  .ts-l { font-size: 6px !important; }
  #color-sel, #estado-sel { font-size: 9px !important; padding: 3px 5px !important; }
  #op-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
  .op-tab { flex: 0 0 auto; }
  #detail { max-height: none !important; }
  #grupo-simce { display: none; }
}
#top { display: flex; align-items: center; gap: 12px; padding: 0 16px; background: #031794; border-bottom: 2px solid #0226b8; flex-shrink: 0; height: 52px; }
#logo-aa { height: 52px; object-fit: cover; margin: 0 -4px 0 -16px; }
#sep { width: 1px; height: 30px; background: rgba(255,255,255,0.25); margin: 0 4px; }
#logo-mp { height: 28px; object-fit: contain; margin: 0 4px; }
#top-stats { display: flex; gap: 6px; margin-left: auto; align-items: center; }
.ts { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 3px 10px; text-align: center; }
.ts-n { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.2; }
.ts-l { font-size: 8px; color: rgba(255,255,255,0.55); letter-spacing: 1px; text-transform: uppercase; }
#colorby { display: flex; align-items: center; gap: 6px; padding-left: 10px; border-left: 1px solid rgba(255,255,255,0.2); }
#colorby label { font-size: 10px; color: #fff; white-space: nowrap; font-weight: 700; }
#estadoby { display: flex; align-items: center; gap: 6px; padding-left: 10px; border-left: 1px solid rgba(255,255,255,0.2); }
#estadoby label { font-size: 10px; color: #fff; white-space: nowrap; font-weight: 700; }
#estado-sel { font-size: 10px; border: 1px solid rgba(255,255,255,0.25); border-radius: 4px; padding: 4px 8px; color: #1e293b; background: #64748b; outline: none; cursor: pointer; }
#banner-title { font-size: 13px; font-weight: 700; color: #fff; white-space: nowrap; font-family: Arial, sans-serif; }
#color-sel { font-size: 10px; border: 1px solid rgba(255,255,255,0.25); border-radius: 4px; padding: 4px 8px; color: #1e293b; background: #64748b; outline: none; cursor: pointer; }
#body { display: flex; flex: 1; overflow: hidden; }
#map { flex: 1; }
#panel { width: 280px; background: #fff; border-left: 1px solid #e2e8f0; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
#panel-hdr { padding: 10px 12px 8px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
#panel-title { font-size: 9px; font-weight: 700; color: #94a3b8; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
#search { width: 100%; border: 1px solid #e2e8f0; border-radius: 5px; padding: 5px 9px; font-size: 11px; color: #1e293b; outline: none; background: #fff; }
#search:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.12); }
#op-tabs { display: flex; border-bottom: 2px solid #e2e8f0; background: #fff; flex-shrink: 0; }
.op-tab { flex: 1; padding: 8px 2px; text-align: center; font-size: 9px; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; color: #94a3b8; transition: all 0.15s; user-select: none; }
.op-tab:hover { background: #f8fafc; }
.op-tab.active { border-bottom-color: var(--op-color,#475569); color: var(--op-color,#475569); }
.op-tab.tab-todas { --op-color: #475569; }
.op-tab.tab-bronces { --op-color: #b45309; }
.op-tab.tab-chagres { --op-color: #0e9e6e; }
.op-tab.tab-soldado { --op-color: #dc2626; }
#legend { padding: 6px 12px; border-bottom: 1px solid #f1f5f9; display: flex; flex-wrap: wrap; gap: 3px; }
.leg { display: flex; align-items: center; gap: 4px; font-size: 8px; color: #64748b; cursor: pointer; padding: 2px 6px; border-radius: 10px; user-select: none; transition: opacity 0.15s; }
.leg:hover { background: #f1f5f9; }
.leg.off { opacity: 0.28; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
#list { flex: 1; overflow-y: auto; }
#list::-webkit-scrollbar { width: 3px; }
#list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
.item { padding: 7px 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; display: flex; align-items: flex-start; gap: 7px; transition: background 0.1s; }
.item:hover { background: #f8fafc; }
.item.active { background: #eff6ff; border-left: 3px solid #1d4ed8; padding-left: 9px; }
.item-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
.i-name { font-size: 10px; color: #1e293b; font-weight: 600; line-height: 1.35; margin-bottom: 1px; }
.i-meta { font-size: 8px; color: #94a3b8; }
.op-pill { display: inline-block; font-size: 7px; font-weight: 700; padding: 1px 5px; border-radius: 8px; margin-left: 3px; vertical-align: middle; }
.op-bronces { background: #fef3c7; color: #b45309; }
.op-chagres { background: #d1fae5; color: #0e9e6e; }
.op-soldado { background: #fee2e2; color: #dc2626; }
#count { font-size: 8px; color: #94a3b8; padding: 4px 12px; border-top: 1px solid #f1f5f9; flex-shrink: 0; }
#grupo-simce { flex-shrink:0; background:#f8fafc; border-bottom:1px solid #e2e8f0; padding:8px 12px; }
#grupo-simce .gs-title { font-size:7.5px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:#94a3b8; margin-bottom:6px; }
#grupo-simce .gs-nivel { margin-bottom:5px; }
#grupo-simce .gs-nivel-label { font-size:7px; font-weight:700; color:#475569; text-transform:uppercase; letter-spacing:0.8px; margin-bottom:3px; }
#grupo-simce .gs-bar-row { display:flex; align-items:center; gap:5px; margin-bottom:2px; }
#grupo-simce .gs-bar-label { font-size:7px; color:#64748b; width:22px; flex-shrink:0; }
#grupo-simce .gs-bar-wrap { flex:1; background:#e2e8f0; border-radius:3px; height:7px; position:relative; overflow:visible; }
#grupo-simce .gs-bar-fill { height:100%; border-radius:3px; }
#grupo-simce .gs-bar-nac { position:absolute; top:-2px; bottom:-2px; width:2px; background:#94a3b8; border-radius:1px; }
#grupo-simce .gs-bar-val { font-size:7.5px; font-weight:700; width:26px; text-align:right; flex-shrink:0; }
#grupo-simce .gs-bar-delta { font-size:7px; font-weight:700; width:28px; flex-shrink:0; }
#grupo-simce .gs-over { font-size:6.5px; color:#94a3b8; margin-top:1px; }
#detail { border-top: 1px solid #e2e8f0; flex-shrink: 0; background: #fafcff; overflow-y: auto; max-height: 320px; }
#detail::-webkit-scrollbar { width: 3px; }
#detail::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
.det-hdr { padding: 9px 12px 6px; border-bottom: 1px solid #f1f5f9; }
.det-name { font-size: 11px; font-weight: 700; color: #1e293b; line-height: 1.4; }
.det-comuna { font-size: 9px; color: #64748b; margin-top: 1px; }
.det-section { padding: 6px 12px; border-bottom: 1px solid #f1f5f9; }
.det-section-title { font-size: 8.5px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #000000; margin-bottom: 5px; }
.det-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px; }
.det-cell { }
.det-k { font-size: 7px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
.det-v { font-size: 10px; color: #334155; font-weight: 700; }
.det-v-sm { font-size: 9px; color: #334155; font-weight: 600; }
.simce-box { display: flex; align-items: center; justify-content: space-between; background: #f8fafc; border-radius: 6px; padding: 5px 8px; }
.simce-score { font-size: 18px; font-weight: 800; color: #1d4ed8; }
.simce-label { font-size: 8px; color: #64748b; }
.simce-nat { font-size: 8px; color: #94a3b8; }
.cat-alto { color: #16a34a; background: #dcfce7; }
.cat-medio { color: #1d4ed8; background: #dbeafe; }
.cat-medio-bajo { color: #d97706; background: #fef3c7; }
.cat-insuf { color: #dc2626; background: #fee2e2; }
.cat-badge { font-size: 8px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.ive-bar-wrap { margin-top: 4px; }
.ive-bar-bg { background: #e2e8f0; border-radius: 3px; height: 5px; overflow: hidden; }
.ive-bar-fill { height: 100%; border-radius: 3px; }
.det-badges { padding: 6px 12px 8px; display: flex; gap: 5px; flex-wrap: wrap; }
.badge { font-size: 8px; padding: 2px 8px; border-radius: 10px; font-weight: 700; border: 1px solid; }
.placeholder { padding: 20px 12px; font-size: 10px; color: #94a3b8; text-align: center; line-height: 1.8; }
.mp-tip { background: #1e293b !important; color: #fff !important; border: none !important; border-radius: 4px !important; font-size: 10px !important; font-weight: 600 !important; padding: 4px 8px !important; white-space: nowrap !important; }
</style>
</head>

function hexToRgb(h){
  var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return [r,g,b];
}
function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(function(v){return Math.min(255,Math.max(0,v)).toString(16).padStart(2,'0');}).join('');
}
function lighten(h,amt){
  amt=amt||60; var rgb=hexToRgb(h);
  return rgbToHex(rgb[0]+amt,rgb[1]+amt,rgb[2]+amt);
}
function darken(h,amt){
  amt=amt||40; var rgb=hexToRgb(h);

function matSize(mat){
  if(!mat||mat<=0) return 8;
  var minM=12, maxM=1959, minS=5, maxS=32;
  var t=Math.pow((mat-minM)/(maxM-minM),0.45);
  return Math.round(minS+(maxS-minS)*t);
}

function setOpTab(op,el){

    if(pts.length){
      var lats=pts.map(function(d){return d.lat;}),lngs=pts.map(function(d){return d.lng;});
      map.fitBounds([[Math.min.apply(null,lats)-0.03,Math.min.apply(null,lngs)-0.06],[Math.max.apply(null,lats)+0.03,Math.max.apply(null,lngs)+0.06]],{padding:[60,60]});

function refreshMarkers(){
  var vis=0;
  for(var i=0;i<DATA.length;i++){
    var d=DATA[i];
    var keyOk=activeKeys.has(getVal(d));
    var estadoOk=(estadoFilter==='todos'||d.estado===estadoFilter);
    var opOk=(opFilter==='todas'||d.operacion===opFilter);
    if(keyOk&&estadoOk){
      markers[i].addTo(map);
      markers[i].setIcon(makeIcon(d,activeIdx===i));
      if(opOk||opFilter==='todas') vis++;
    } else {
      markers[i].remove();
    }
  }
  document.getElementById('st-n').textContent=vis;
}

function renderLegend(){
  var keys=getKeys(),html='',idx=0;
  for(var k in keys){

      +'<div class="leg-dot" style="background:'+keys[k]+'"></div>'+k+'</div>';
    idx++;
  }
  document.getElementById('legend').innerHTML=html;
}

function toggleKey(idx){
  var k=keysList[idx]; if(!k)return;
  if(activeKeys.has(k))activeKeys.delete(k); else activeKeys.add(k);
  refreshMarkers(); renderLegend(); renderList();
}

      +'</div>';
  }

  document.getElementById('detail').innerHTML=
    '<div class="det-hdr"><div class="det-name">'+d.nombre+'</div>'
    +'<div class="det-comuna">'+d.comuna+(d.dir&&d.dir!=='—'?' · '+d.dir:'')+'</div></div>'
    +'<div class="det-section"><div class="det-section-title">Datos del establecimiento</div>'
    +'<div class="det-grid">'
    +'<div class="det-cell"><div class="det-k">RBD</div><div class="det-v-sm">'+d.rbd+'</div></div>'
    +'<div class="det-cell"><div class="det-k">Dependencia</div><div class="det-v-sm">'+d.dep+'</div></div>'
    +'<div class="det-cell"><div class="det-k">Ingreso MP</div><div class="det-v-sm">'+(d.año_ingreso||'N/A')+'</div></div>'
    +'<div class="det-cell"><div class="det-k">Egreso MP</div><div class="det-v-sm">'+(d.año_salida||'N/A')+'</div></div>'
    +'<div class="det-cell"><div class="det-k">Duración</div><div class="det-v-sm">'+dur+'</div></div>'
    +(d.mat>0?'<div class="det-cell"><div class="det-k">Matrícula</div><div class="det-v-sm">'+d.mat.toLocaleString('es-CL')+'</div></div>':'')
    +'</div></div>'
    +simceHTML
    +iveHTML
    +'<div class="det-badges">'
    +'<span class="badge" style="color:'+ec+';border-color:'+ec+'44;background:'+ec+'14;">'+d.estado+'</span>'
    +'<span class="op-pill '+opCls+'" style="border:1px solid">'+d.operacion+'</span>'
    +'</div>';
}

window.addEventListener('orientationchange', function(){
  setTimeout(function(){ if(map) map.invalidateSize(); }, 400);
});
window.addEventListener('resize', function(){
  setTimeout(function(){ if(map) map.invalidateSize(); }, 200);
});
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" onload="initMap()"></script>
</body>
